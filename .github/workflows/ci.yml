name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Sanity Checks / build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Worker typecheck
        run: npm run worker:check

      - name: Web build
        run: npm run web:build

      - name: Worker smoke (Miniflare, hermetic)
        run: npm run worker:safety-smoke
